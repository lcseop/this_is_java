spring:
  application:
    name: sbsecurity_login
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/auth_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: auth_user
    password: qwer1234!
  jpa:
    hibernate:
      ddl-auto: update # Entity 의 멤버변수가 변하면 자동으로 데이터베이스의 테이블도 갱신해준다.
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
      dialect: org.hibernate.dialect.MySQL8InnoDBDialect
  #    resources:
  #      add-mappings: false # 404.html 출력 하지 마라
  mustache:
    suffix: .html
    servlet:
      cache: false
      expose-request-attributes: true
    charset: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

server:
  port: 8082

kind: Application
