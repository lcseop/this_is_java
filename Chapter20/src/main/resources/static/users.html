<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유저</title>
</head>
<body>
    <section id="inputData">
        <fieldset class="inputField">
            <legend>유저 입력</legend>
            <div class="inputField">아이디 <input type="text" id="userId"></div>
            <div class="inputField">이름 <input type="text" id="userName"></div>
            <div class="inputField">비밀번호 <input type="password" id="userPw"></div>
            <div class="inputField">나이 <input type="number" id="userAge"></div>
            <div class="inputField">이메일 <input type="email" id="userEmail"></div>
            <button id="dataAdd">추가</button>
            <button id="dataEmpty">취소</button>
        </fieldset>

    </section>
</body>
</html>
