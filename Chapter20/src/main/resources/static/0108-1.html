<!DOCTYPE html>
<html>
  <head>
    <meta lang="ko" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>닌텐도 게임</title>
    <link rel="stylesheet" href="./css/0108-1.css" />
  </head>
  <body>
    <header>
      <h1>닌텐도 게임 정보</h1>
    </header>
    <main>
      <section id="inputSection">
        <fieldset class="inputField">
          <legend>게임 입력</legend>
          <div class="inputItem">
            <div class="text-wrapper">게임제목</div>
            <div class="div">
              <input type="hidden" id="id" value="0"/>
              <input type="text" id="name" class="inputText" maxlength="30"/>
            </div>
          </div>
          <div class="inputItem">
            <div class="text-wrapper">장르</div>
            <div class="div">
              <select id="genre" class="selectCombo">
                <option value="A">액션</option>
                <option value="S">스포츠</option>
                <option value="R">RPG</option>
                <option value="C">레이싱</option>
                <option value="V">어드벤쳐</option>
              </select>
            </div>
          </div>
          <div class="inputItem">
            <div class="text-wrapper">등급</div>
            <div class="div">
              <select id="grade" class="selectCombo">
                <option value="ALL">전체이용가</option>
                <option value="7">7세 이상</option>
                <option value="12">12세 이상</option>
                <option value="15">15세 이상</option>
                <option value="18">18세 이상</option>
              </select>
            </div>
          </div>
          <div class="inputItem">
            <div class="text-wrapper">가격</div>
            <div class="div">
              <input type="number" id="price" class="inputNumber" value="0" min="0" max="999999" />
            </div>
          </div>
          <div class="inputItem">
            <div class="text-wrapper">이미지주소</div>
            <div class="div">
              <input type="text" id="imgUrl" class="inputText"/>
            </div>
          </div>
          <div class="inputImage">
            <img
              id="imgPreview"
              class="showImage"
              src="./img/nonimage.png"
              alt="게임 대표 이미지"
              onerror="this.src='./img/nonimage.png'"
            />
          </div>
          <div class="inputButtons">
            <div class="btn-wrapper">
              <button id="btnAdd" class="btn">추가</button>
            </div>
            <div class="btn-wrapper">
              <button id="btnEdit" class="btn">수정</button>
            </div>
            <div class="btn-wrapper">
              <button id="btnDel" class="btn">삭제</button>
            </div>
          </div>
        </fieldset>
      </section>
      <section id="listSection">
        <fieldSet id="searchField">
              <div class="searchRow">
                <legend>검색 (이름, 등급, 장르)</legend>
                <label for="searchName">제목</label><input type="text" id="searchName" />
                <label for="searchGrade">등급</label>
                <select type="text" id="searchGrade">
                  <option value="">전체검색</option>
                  <option value="ALL">전체이용가</option>
                  <option value="7">7세 이상</option>
                  <option value="12">12세 이상</option>
                  <option value="15">15세 이상</option>
                  <option value="18">18세 이상</option>
                </select>
                <label for="searchGenre">장르</label>
                <select type="text" id="searchGenre">
                  <option value="">전체검색</option>
                  <option value="A">액션</option>
                  <option value="S">스포츠</option>
                  <option value="R">RPG</option>
                  <option value="C">레이싱</option>
                  <option value="V">어드벤쳐</option>
                </select>
                <label for="rowsPerPage">표시 행</label>
                <select type="text" id="rowsPerPage">
                  <option value="2">2</option>
                  <option value="5">5</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                  <option value="20">20</option>
                </select>
                <button id="btnSearch">검색</button>
              </div>
        </fieldSet>
        <fieldset class="listField">
          <legend>게임 목록</legend>
          <div class="listTitleRow">
            <div class="listItem">
              <div class="itemTitle text-wrapper">장르</div>
            </div>
            <div class="listItem">
              <div class="itemTitle text-wrapper">등급</div>
            </div>
            <div class="listItem">
              <div class="itemTitle text-wrapper">제목</div>
            </div>
          </div>
          <div class="listDataBlock">
            <!-- <div class="listDataRow">
              <div class="listItem">
                <div class="itemData text-wrapper">레이싱</div>
              </div>
              <div class="listItem">
                <div class="itemData text-wrapper">15세</div>
              </div>
              <div class="listItem">
                <div class="itemData text-wrapper">마리오 카트</div>
              </div>
            </div> -->
          </div>
        </fieldset>
      </section>
      <section id="pageSection">
        <button class="btnPage">1</button>
        <button class="btnPage">2</button>
        <button class="btnPage">3</button>
      </section>
    </main>
    <footer>
      <div>made 2026-01-09</div>
    </footer>
  </body>
</html>
<script src="./js/jquery.min.js"></script>
<script src="./js/0108-1.js"></script>
